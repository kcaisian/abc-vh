<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC — Adaptive Exercise Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2d1f16;
    --surface: #433528;
    --surface2: #574334;
    --border: #7a5f4f;
    --accent: #c9a77b;
    --accent2: #d6b992;
    --accent3: #a67a53;
    --text: #f4ede3;
    --muted: #beac9c;
    --radius: 12px;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: var(--serif); font-weight: 600; font-size: 22px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { color: var(--text); font-style: italic; font-weight: 300; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 8px; transition: background 0.3s; }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .header-status { font-size: 16px; color: var(--muted); display: flex; align-items: center; gap: 12px; }
  .ghost-toggle-btn {
    background: rgba(201,167,123,0.18);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, border-color 0.2s;
  }
  .ghost-toggle-btn:hover { background: rgba(201,167,123,0.28); border-color: var(--accent); transform: translateY(-1px); }
  .ghost-toggle-btn.active { background: rgba(201,167,123,0.28); border-color: var(--accent); color: var(--accent); }

  .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 61px); }

  /* CAMERA */
  .camera-zone { flex: 1; position: relative; background: #080a09; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; transition: opacity 0.5s; }
  #video.visible { opacity: 1; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); }

  /* GHOST CANVAS — separate layer, no flip needed (we handle coords manually) */
  #ghostCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }

  .camera-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted); font-size: 17px; }
  .camera-placeholder svg { opacity: 0.3; }
  .start-btn { background: var(--accent); color: #0d0f0e; border: none; border-radius: var(--radius); padding: 14px 30px; font-family: var(--mono); font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .start-btn:hover { transform: scale(1.03); }

  /* OVERLAY */
  .feedback-overlay { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
  .detection-badge { background: rgba(13,15,14,0.85); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 16px; color: var(--muted); display: none; }
  .detection-badge.visible { display: block; }
  .detection-badge.detected { border-color: var(--accent); color: var(--accent); }
  .detection-badge.warn { border-color: var(--accent3); color: var(--accent3); }

  /* POSE MATCH INDICATOR — top center */
  .pose-match-bar {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(13,15,14,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 18px; font-size: 16px; color: var(--muted);
    display: none; align-items: center; gap: 10px; z-index: 10; white-space: nowrap;
  }
  .pose-match-bar.visible { display: flex; }
  .pose-match-track { width: 100px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .pose-match-fill { height: 100%; width: 0%; border-radius: 3px; background: var(--accent3); transition: width 0.15s, background 0.2s; }
  .pose-match-fill.close { background: var(--accent2); }
  .pose-match-fill.matched { background: #6ee7a0; }

  /* PHASE TRANSITION FLASH */
  .phase-flash {
    position: absolute; inset: 0; background: rgba(201,167,123,0.12);
    opacity: 0; pointer-events: none; z-index: 8; border-radius: 0;
    transition: opacity 0.08s;
  }
  .phase-flash.flash { opacity: 1; }

  /* GHOST LABEL — above the bottom-centre ghost */
  .ghost-label {
    position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
    background: rgba(13,15,14,0.8); backdrop-filter: blur(6px);
    border: 1px solid rgba(201,167,123,0.4); border-radius: 8px;
    padding: 6px 16px; font-size: 16px; color: var(--accent2);
    z-index: 10; pointer-events: none; display: none;
    letter-spacing: 0.5px;
  }
  .ghost-label.visible { display: block; }

  .step-prompt { display: none; }
  .step-prompt.show { display: none; }
  .step-prompt.good { display: none; }
  .step-prompt.warn { display: none; }

  /* BODY PARTS WARNING */
  .parts-warning {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(6px);
    width: calc(100% - 48px); max-width: 1800px;
    background: rgba(201,167,123,0.35); backdrop-filter: blur(8px);
    border: 1px solid rgba(201,167,123,0.75); border-radius: 12px;
    padding: 16px 30px; font-size: 35px; font-weight: 700; color: #433528;
    pointer-events: none; opacity: 0; transition: opacity 0.18s, transform 0.18s;
    white-space: normal; z-index: 11; text-align: center;
    line-height: 1.2; max-height: 110px; overflow-wrap: anywhere; overflow: visible;
  }
  .parts-warning.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* HOLD RING */
  .hold-ring-container { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: none; z-index: 10; width: 120px; height: 120px; }
  .hold-ring-container.visible { display: block; }
  .hold-ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 0 12px rgba(94,245,160,0.4)); }
  .hold-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--accent); font-family: var(--mono); text-shadow: 0 0 8px rgba(0,0,0,0.45); }

  /* LOADING */
  .loading-spinner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: rgba(8,10,9,0.8); font-size: 17px; color: var(--muted); z-index: 10; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATS */
  .stats-panel { width: 220px; min-width: 220px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 14px 13px; gap: 12px; overflow-y: auto; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
  .stat-value { font-size: 38px; font-family: var(--serif); font-weight: 600; color: var(--accent); line-height: 1; }
  .stat-sub { font-size: 15px; color: var(--muted); }
  .stat-value.pop { animation: popAnim 0.3s ease-out; }
  @keyframes popAnim { 0%{transform:scale(1.4)} 100%{transform:scale(1)} }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

  /* ROM BAR */
  .rom-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; display: flex; flex-direction: column; gap: 10px; }
  .rom-bar-wrap { display: flex; gap: 10px; align-items: stretch; height: 160px; }
  .rom-bar-track { width: 26px; background: var(--border); border-radius: 13px; position: relative; overflow: visible; flex-shrink: 0; }
  .rom-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--accent3); border-radius: 13px; height: 0%; transition: height 0.1s, background 0.2s; }
  .rom-bar-fill.partial { background: var(--accent2); }
  .rom-bar-fill.deep { background: var(--accent); }
  .rom-target-line { position: absolute; left: -6px; right: -6px; height: 2px; background: rgba(201,167,123,0.55); pointer-events: none; }
  .rom-target-label { position: absolute; left: 32px; font-size: 13px; color: rgba(201,167,123,0.6); transform: translateY(50%); white-space: nowrap; }
  .rom-labels { display: flex; flex-direction: column; justify-content: space-between; font-size: 14px; color: var(--muted); padding: 0; flex: 1; }
  .rom-pct { font-size: 20px; font-family: var(--serif); font-weight: 600; color: var(--accent); line-height: 1; }
  .rom-pct-label { font-size: 14px; color: var(--muted); }

  .angle-row { display: flex; justify-content: space-between; font-size: 15px; color: var(--muted); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .angle-row:last-child { border-bottom: none; }
  .angle-val { color: var(--text); font-weight: 500; }
  .angle-val.active { color: var(--accent); }
  .angle-val.missing { color: var(--accent3); }

  .log-entries { display: flex; flex-direction: column; gap: 3px; max-height: 100px; overflow-y: auto; }
  .log-entry { font-size: 15px; color: var(--muted); padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .log-entry .log-time { color: var(--accent); }

  .reset-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--muted); font-family: var(--mono); font-size: 16px; cursor: pointer; transition: all 0.15s; width: 100%; }
  .reset-btn:hover { border-color: var(--accent3); color: var(--accent3); }
</style>
</head>
<body>

<header>
  <div class="logo">ABC</div>
  <div class="header-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">camera off</span>
    <button class="ghost-toggle-btn active" id="ghostToggleButton" type="button">Silhoutte: On</button>
  </div>
</header>

<div class="app">
  <div id="sidebarContainer"></div>
  <script>
    async function loadSidebar() {
      try {
        const response = await fetch("sidebar.html");
        const html = await response.text();
        const template = document.createElement("template");
        template.innerHTML = html;
        const style = template.content.querySelector("style");
        if (style) document.head.appendChild(style);
        const aside = template.content.querySelector("aside");
        if (aside) document.getElementById("sidebarContainer").appendChild(aside);
      } catch (e) {}
    }
    loadSidebar();
  </script>

  <div class="camera-zone">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <canvas id="ghostCanvas"></canvas>

    <div class="camera-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="2" y="10" width="44" height="32" rx="6" stroke="#7a8c7e" stroke-width="2"/>
        <circle cx="24" cy="26" r="9" stroke="#7a8c7e" stroke-width="2"/>
        <circle cx="24" cy="26" r="4" fill="#7a8c7e"/>
        <path d="M16 10V8a3 3 0 013-3h10a3 3 0 013 3v2" stroke="#7a8c7e" stroke-width="2"/>
      </svg>
      <div id="placeholderMsg">Allow camera access to begin</div>
      <button class="start-btn" onclick="startCamera()">Start Camera</button>
    </div>

    <div class="loading-spinner" id="loadingSpinner" style="display:none">
      <div class="spinner"></div>
      <span id="loadingMsg">Loading MediaPipe…</span>
    </div>

    <div class="feedback-overlay">
      <div class="detection-badge" id="detectionBadge">No body detected</div>
    </div>

    <!-- Pose match bar -->
    <div class="pose-match-bar" id="poseMatchBar">
      <span id="poseMatchLabel">Match pose</span>
      <div class="pose-match-track">
        <div class="pose-match-fill" id="poseMatchFill"></div>
      </div>
      <span id="poseMatchPct">0%</span>
    </div>

    <!-- Phase transition flash -->
    <div class="phase-flash" id="phaseFlash"></div>

    <!-- Ghost pose label -->
    <div class="ghost-label" id="ghostLabel">↓ Match the pose</div>

    <div class="step-prompt" id="stepPrompt"></div>
    <div class="parts-warning" id="partsWarning"></div>

    <div class="hold-ring-container" id="holdRingContainer">
      <svg class="hold-ring-svg" width="120" height="120" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="#2a312d" stroke-width="8"/>
        <circle id="holdArc" cx="40" cy="40" r="34" fill="none" stroke="#5ef5a0" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
      </svg>
      <div class="hold-ring-text" id="holdTimer">0s</div>
    </div>
  </div>

  <aside class="stats-panel">
    <div class="stat-card">
      <div class="stat-label" id="statModeLabel">Reps</div>
      <div class="stat-value" id="repCount">0</div>
      <div class="stat-sub" id="statSub">of 10 target</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="rom-card">
      <div class="stat-label">Range of Motion</div>
      <div class="rom-bar-wrap">
        <div class="rom-bar-track" style="overflow:visible">
          <div class="rom-bar-fill" id="romFill"></div>
          <div class="rom-target-line" id="romTargetLine" style="bottom:75%">
            <span class="rom-target-label">target</span>
          </div>
        </div>
        <div class="rom-labels">
          <span>Full</span><span></span><span></span><span></span><span>Start</span>
        </div>
      </div>
      <div class="rom-pct" id="romPct"></div>
      <div class="rom-pct-label" id="romPctLabel"></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Joint Angles</div>
      <div class="angle-row"><span>L Elbow</span><span class="angle-val" id="aLElbow">—°</span></div>
      <div class="angle-row"><span>R Elbow</span><span class="angle-val" id="aRElbow">—°</span></div>
      <div class="angle-row"><span>L Shoulder</span><span class="angle-val" id="aLShoulder">—°</span></div>
      <div class="angle-row"><span>R Shoulder</span><span class="angle-val" id="aRShoulder">—°</span></div>
      <div class="angle-row"><span>L Knee</span><span class="angle-val" id="aLKnee">—°</span></div>
      <div class="angle-row"><span>R Knee</span><span class="angle-val" id="aRKnee">—°</span></div>
    </div>

    <div class="stat-card">
      <div class="stat-label">Session Log</div>
      <div class="log-entries" id="logEntries">
        <div class="log-entry" style="color:var(--muted);font-size:15px">No reps yet</div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetStats()">↺ Reset Session</button>
  </aside>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── GHOST POSE SKELETON CONNECTIONS ──
// Indices into the 12-point simplified skeleton used for ghost poses
const GC = [[0,1],[0,2],[1,3],[2,4],[3,5],[0,6],[1,7],[6,7],[6,8],[8,10],[7,9],[9,11]];

// Ghost pose keypoints — 12 joints mapped to the simplified skeleton:
// [0]=L-shoulder [1]=R-shoulder [2]=L-elbow [3]=R-elbow [4]=L-wrist [5]=R-wrist
// [6]=L-hip [7]=R-hip [8]=L-knee [9]=R-knee [10]=L-ankle [11]=R-ankle
// Coordinates are relative to shoulder-midpoint; scale unit = shoulder width.
// The figure is anchored feet-at-bottom, so the full body spans roughly y=-3 (head) to y=+4 (feet).
// x=0 is the body centerline; positive-x = right of figure (mirrored: appears left on screen).
//
// Standing neutral reference (arms at sides):
//   shoulders y=0, hips y=+1.5, knees y=+2.9, ankles y=+4.1, head above y=-1
//
const GP = {
  // ── ARM RAISES ─────────────────────────────────────────────────────────────
  // down = arms relaxed at sides (starting position)
  // up   = arms raised straight out to shoulder height (90° abduction)
  arm_raise:{
    down:[
      {x:-.5,y:0},{x:.5,y:0},           // shoulders
      {x:-.52,y:.85},{x:.52,y:.85},      // elbows (hang down)
      {x:-.52,y:1.7},{x:.52,y:1.7},     // wrists
      {x:-.38,y:1.55},{x:.38,y:1.55},   // hips
      {x:-.38,y:2.85},{x:.38,y:2.85},   // knees
      {x:-.38,y:4.1},{x:.38,y:4.1},     // ankles
    ],
    up:[
      {x:-.5,y:0},{x:.5,y:0},           // shoulders
      {x:-1.15,y:0},{x:1.15,y:0},       // elbows (fully abducted — T shape)
      {x:-1.75,y:0},{x:1.75,y:0},       // wrists (arms straight out)
      {x:-.38,y:1.55},{x:.38,y:1.55},   // hips
      {x:-.38,y:2.85},{x:.38,y:2.85},   // knees
      {x:-.38,y:4.1},{x:.38,y:4.1},     // ankles
    ],
  },

  // ── BICEP CURLS ────────────────────────────────────────────────────────────
  // down = arms fully extended at sides (elbows ~170°)
  // up   = arms curled to ~45° (elbows fully flexed, wrists near shoulders)
  bicep_curl:{
    down:[
      {x:-.5,y:0},{x:.5,y:0},
      {x:-.52,y:.85},{x:.52,y:.85},
      {x:-.52,y:1.7},{x:.52,y:1.7},
      {x:-.38,y:1.55},{x:.38,y:1.55},
      {x:-.38,y:2.85},{x:.38,y:2.85},
      {x:-.38,y:4.1},{x:.38,y:4.1},
    ],
    up:[
      {x:-.5,y:0},{x:.5,y:0},
      {x:-.6,y:.65},{x:.6,y:.65},        // elbows slightly out
      {x:-.55,y:-.55},{x:.55,y:-.55},    // wrists up near head level
      {x:-.38,y:1.55},{x:.38,y:1.55},
      {x:-.38,y:2.85},{x:.38,y:2.85},
      {x:-.38,y:4.1},{x:.38,y:4.1},
    ],
  },

  // ── PUSH-UP ────────────────────────────────────────────────────────────────
  // The figure is horizontal (lying face-down), so we rotate the coordinate system.
  // x = horizontal body axis (head left → feet right), y = vertical (up).
  // Shoulders are the anchor; the body is laid out along the x-axis.
  // up   = top of push-up (arms extended)
  // down = bottom of push-up (chest near floor, elbows bent ~90°)
  pushup:{
    up:[
      {x:-.5,y:0},{x:.5,y:0},            // shoulders
      {x:-.5,y:-.9},{x:.5,y:-.9},        // elbows (directly below shoulders, arms extended)
      {x:-.5,y:-1.8},{x:.5,y:-1.8},      // wrists (hands on floor)
      {x:-.4,y:1.05},{x:.4,y:1.05},      // hips (body plank — slightly higher)
      {x:-.35,y:2.45},{x:.35,y:2.45},    // knees
      {x:-.3,y:3.7},{x:.3,y:3.7},        // ankles (feet)
    ],
    down:[
      {x:-.5,y:0},{x:.5,y:0},            // shoulders (lowered toward floor)
      {x:-.7,y:-.55},{x:.7,y:-.55},      // elbows flared out at 90°
      {x:-.5,y:-1.3},{x:.5,y:-1.3},      // wrists (hands on floor)
      {x:-.4,y:1.05},{x:.4,y:1.05},      // hips stay level
      {x:-.35,y:2.45},{x:.35,y:2.45},
      {x:-.3,y:3.7},{x:.3,y:3.7},
    ],
  },

  // ── SHOULDER PRESS ─────────────────────────────────────────────────────────
  // down = hands at shoulder height, elbows bent ~90° (start)
  // up   = arms fully extended overhead
  shoulder_press:{
    down:[
      {x:-.5,y:0},{x:.5,y:0},
      {x:-.75,y:0},{x:.75,y:0},          // elbows wide at shoulder level
      {x:-.75,y:-.95},{x:.75,y:-.95},    // wrists at ears / shoulder level
      {x:-.38,y:1.55},{x:.38,y:1.55},
      {x:-.38,y:2.85},{x:.38,y:2.85},
      {x:-.38,y:4.1},{x:.38,y:4.1},
    ],
    up:[
      {x:-.5,y:0},{x:.5,y:0},
      {x:-.52,y:-.95},{x:.52,y:-.95},    // elbows rising
      {x:-.48,y:-2.0},{x:.48,y:-2.0},   // wrists fully overhead
      {x:-.38,y:1.55},{x:.38,y:1.55},
      {x:-.38,y:2.85},{x:.38,y:2.85},
      {x:-.38,y:4.1},{x:.38,y:4.1},
    ],
  },

  // ── CHEST STRETCH ──────────────────────────────────────────────────────────
  // rest = arms relaxed at sides
  // hold = arms spread wide at shoulder height (chest open, palms forward)
  chest_stretch:{
    rest:[
      {x:-.5,y:0},{x:.5,y:0},
      {x:-.52,y:.85},{x:.52,y:.85},
      {x:-.52,y:1.7},{x:.52,y:1.7},
      {x:-.38,y:1.55},{x:.38,y:1.55},
      {x:-.38,y:2.85},{x:.38,y:2.85},
      {x:-.38,y:4.1},{x:.38,y:4.1},
    ],
    hold:[
      {x:-.5,y:0},{x:.5,y:0},

// ANGLE MATH
function angle3(a,b,c){
  if(!a||!b||!c)return null;
  const ab=[a.x-b.x,a.y-b.y],cb=[c.x-b.x,c.y-b.y];
  const dot=ab[0]*cb[0]+ab[1]*cb[1];
  const mag=Math.sqrt((ab[0]**2+ab[1]**2))*Math.sqrt((cb[0]**2+cb[1]**2));
  if(!mag)return null;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI);
}

function getAngles(lm){
  const vis=l=>l&&l.visibility>0.45;
  const L={s:lm[11],e:lm[13],w:lm[15],h:lm[23],k:lm[25],a:lm[27]};
  const R={s:lm[12],e:lm[14],w:lm[16],h:lm[24],k:lm[26],a:lm[28]};
  return{
    LElbow: vis(L.s)&&vis(L.e)&&vis(L.w)?angle3(L.s,L.e,L.w):null,
    RElbow: vis(R.s)&&vis(R.e)&&vis(R.w)?angle3(R.s,R.e,R.w):null,
    LShoulder: vis(L.h)&&vis(L.s)&&vis(L.e)?angle3(L.h,L.s,L.e):null,
    RShoulder: vis(R.h)&&vis(R.s)&&vis(R.e)?angle3(R.h,R.s,R.e):null,
    LKnee: vis(L.h)&&vis(L.k)&&vis(L.a)?angle3(L.h,L.k,L.a):null,
    RKnee: vis(R.h)&&vis(R.k)&&vis(R.a)?angle3(R.h,R.k,R.a):null,
  };
}

// ── GHOST POSE SYSTEM ──────────────────────────────────────────────────────────

// Given the current exercise and target phase, figure out what pose to show.
function getTargetPoseKey(ex, currentPhase) {
  const poses = ex.poses;
  if (!poses) return null;
  // For rep exercises: show the NEXT phase (what to move toward)
  // For hold exercises: show the hold pose
  if (ex.type === "rep") {
    if (repPhase === "up") return poses.down ? "down" : "up";
    if (repPhase === "down") return poses.up ? "up" : "down";
  }
  // hold exercise
  return poses.hold ? "hold" : "rest";
}

// Compute how closely the user's live landmarks match the target ghost pose.
// We compare the angles from the mediapipe skeleton to what those angles
// should be in the ghost pose, rather than raw positions (which shift with distance).
// Returns 0-1 match score.
function computePoseMatchScore(lm, targetJoints) {
  if (!lm || !targetJoints) return 0;

  // We'll compare a few key angles derived from the ghost joints
  // vs the same angles from the live landmark data.
  // Ghost joint layout: [0]=Lshoulder,[1]=Rshoulder,[2]=Lelbow,[3]=Relbow,
  //                     [4]=Lwrist,[5]=Rwrist,[6]=Lhip,[7]=Rhip,
  //                     [8]=Lknee,[9]=Rknee,[10]=Lankle,[11]=Rankle
  function ghostAngle(a, b, c) {
    const ab=[targetJoints[a].x-targetJoints[b].x, targetJoints[a].y-targetJoints[b].y];
    const cb=[targetJoints[c].x-targetJoints[b].x, targetJoints[c].y-targetJoints[b].y];
    const dot=ab[0]*cb[0]+ab[1]*cb[1];
    const mag=Math.sqrt(ab[0]**2+ab[1]**2)*Math.sqrt(cb[0]**2+cb[1]**2);
    if(!mag)return null;
    return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
  }

  const angles = getAngles(lm);
  const pairs = [];

  // L elbow: ghost[0]-[2]-[4] vs LElbow
  const gLE = ghostAngle(0,2,4);
  if (gLE !== null && angles.LElbow !== null) pairs.push([gLE, angles.LElbow, 60]);

  // R elbow: ghost[1]-[3]-[5]
  const gRE = ghostAngle(1,3,5);
  if (gRE !== null && angles.RElbow !== null) pairs.push([gRE, angles.RElbow, 60]);

  // L shoulder: ghost[6]-[0]-[2]
  const gLS = ghostAngle(6,0,2);
  if (gLS !== null && angles.LShoulder !== null) pairs.push([gLS, angles.LShoulder, 50]);

  // R shoulder: ghost[7]-[1]-[3]
  const gRS = ghostAngle(7,1,3);
  if (gRS !== null && angles.RShoulder !== null) pairs.push([gRS, angles.RShoulder, 50]);

  // L knee: ghost[6]-[8]-[10]
  const gLK = ghostAngle(6,8,10);
  if (gLK !== null && angles.LKnee !== null) pairs.push([gLK, angles.LKnee, 50]);

  // R knee
  const gRK = ghostAngle(7,9,11);
  if (gRK !== null && angles.RKnee !== null) pairs.push([gRK, angles.RKnee, 50]);

  if (pairs.length === 0) return 0;

  let total = 0;
  for (const [target, actual, tolerance] of pairs) {
    const diff = Math.abs(target - actual);
    const score = Math.max(0, 1 - diff / tolerance);
    total += score;
  }
  return total / pairs.length;
}

// Morph between two pose joint sets for smooth ghost transition
function lerpJoints(from, to, t) {
  if (!from || !to) return to || from;
  return from.map((pt, i) => ({
    x: pt.x + (to[i].x - pt.x) * t,
    y: pt.y + (to[i].y - pt.y) * t,
  }));
}

// Draw the ghost stickman on the ghost canvas
function drawGhostPose(lm) {
  const W = ghostCanvas.width, H = ghostCanvas.height;
  gctx.clearRect(0, 0, W, H);

  if (!ghostVisible) {
    poseMatchBar.classList.remove("visible");
    ghostLabel.classList.remove("visible");
    return;
  }

  const ex = EXERCISES[currentEx];
  if (!ex.poses) return;

  // Resolve which target joints to show
  const poseKey = getTargetPoseKey(ex, repPhase);
  if (!poseKey) return;
  const targetJoints = ex.poses[poseKey];
  if (!targetJoints) return;

  // Update morph animation
  if (ghostMorphTo !== targetJoints) {
    // Phase changed — start morph
    if (ghostMorphTo !== null) {
      ghostMorphFrom = lerpJoints(ghostMorphFrom, ghostMorphTo, ghostMorphT);
    } else {
      ghostMorphFrom = targetJoints;
    }
    ghostMorphTo = targetJoints;
    ghostMorphT = 0;
  }
  ghostMorphT = Math.min(1, ghostMorphT + 0.06); // morph speed
  const joints = lerpJoints(ghostMorphFrom || targetJoints, targetJoints, ghostMorphT);

  // Fixed anchor — ghost centred horizontally, feet near bottom of frame.
  // The figure spans from y=0 (shoulders) down to y=+4.1 (ankles).
  // We place the ankle y at 92% of frame height, then solve for cy (shoulder y).
  // scale is chosen so the figure is a comfortable size (~14% of frame width per shoulder unit).
  const scale = W * 0.08;           // 1 "unit" = 8% of frame width
  const ankleY = H * 0.91;          // ankles sit at 91% down the frame
  const cy = ankleY - 4.1 * scale;  // shoulder anchor derived from ankle position
  const cx = W * 0.5;               // always horizontally centred

  const S = pt => ({
    x: cx + pt.x * scale,
    y: cy + pt.y * scale,
  });

  // Compute match score for coloring
  const matchScore = lm ? computePoseMatchScore(lm, joints) : 0;
  ghostMatchScore = matchScore;

  // Color: brighter orange when unmatched → vivid green when matched
  const r = Math.round(255 - matchScore * 100);
  const g = Math.round(145 + matchScore * 110);
  const b = Math.round(60 - matchScore * 20);
  const alpha = 0.75 + matchScore * 0.2;
  const color = `rgba(${r},${g},${b},${alpha})`;
  const fillColor = `rgba(${r},${g},${b},${Math.min(alpha * 1.1, 1)})`;

  // Draw bones
  gctx.save();
  gctx.setLineDash([7, 5]);
  gctx.lineCap = "round";
  gctx.lineWidth = 5;
  gctx.strokeStyle = color;
  for (const [a, b] of GC) {
    const pA = S(joints[a]), pB = S(joints[b]);
    gctx.beginPath();
    gctx.moveTo(pA.x, pA.y);
    gctx.lineTo(pB.x, pB.y);
    gctx.stroke();
  }

  // Draw joints (circles)
  gctx.setLineDash([]);
  gctx.fillStyle = fillColor;
  gctx.strokeStyle = color;
  gctx.lineWidth = 1.5;

  const HEAD_JOINTS = new Set([0, 1]); // shoulder pair
  for (let i = 0; i < joints.length; i++) {
    const p = S(joints[i]);
    const r = i < 2 ? 6 : 5; // shoulders slightly bigger
    gctx.beginPath();
    gctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    gctx.fill();
    gctx.stroke();
  }

  // Head circle sits above shoulders (negative y offset from shoulder midpoint)
  const shoulderMidX = (S(joints[0]).x + S(joints[1]).x) / 2;
  const shoulderMidY = (S(joints[0]).y + S(joints[1]).y) / 2;
  const headCenter = {
    x: shoulderMidX,
    y: shoulderMidY - scale * 0.55,  // head above shoulders
  };
  gctx.beginPath();
  gctx.arc(headCenter.x, headCenter.y, scale * 0.18, 0, Math.PI * 2);
  gctx.fillStyle = `rgba(${r},${g},${b},0.18)`;
  gctx.fill();
  gctx.strokeStyle = color;
  gctx.lineWidth = 2;
  gctx.setLineDash([5, 4]);
  gctx.stroke();
  gctx.setLineDash([]);

  // Pulse ring when nearly matched (score > 0.75)
  if (matchScore > 0.75) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.008);
    gctx.beginPath();
    gctx.arc(headCenter.x, headCenter.y, scale * 0.18 + 8 + pulse * 6, 0, Math.PI * 2);
    gctx.strokeStyle = `rgba(110,231,160,${0.4 + pulse * 0.3})`;
    gctx.lineWidth = 2;
    gctx.stroke();
  }

  gctx.restore();

  // Update match bar UI
  updatePoseMatchUI(matchScore, poseKey, ex);
}

function updatePoseMatchUI(score, poseKey, ex) {
  if (!ghostVisible) {
    poseMatchBar.classList.remove("visible");
    return;
  }
  poseMatchBar.classList.add("visible");
  const pct = Math.round(score * 100);
  poseMatchFill.style.width = pct + "%";
  poseMatchPct.textContent = pct + "%";

  if (score >= 0.85) {
    poseMatchFill.className = "pose-match-fill matched";
    const label = ex.phaseLabels ? (ex.phaseLabels[poseKey] || "Hold") : "Hold";
    poseMatchLabel.textContent = "✓ " + label;
  } else if (score >= 0.5) {
    poseMatchFill.className = "pose-match-fill close";
    poseMatchLabel.textContent = "Getting close…";
  } else {
    poseMatchFill.className = "pose-match-fill";
    poseMatchLabel.textContent = "Match the silhouette";
  }

  ghostLabel.classList.toggle("visible", running && ghostVisible);
}

function updateGhostToggleButton() {
  if (!ghostToggleButton) return;
  ghostToggleButton.textContent = ghostVisible ? "Silhouette: On" : "Silhouette: Off";
  ghostToggleButton.classList.toggle("active", ghostVisible);
}

function toggleGhost() {
  ghostVisible = !ghostVisible;
  updateGhostToggleButton();
  if (!ghostVisible) {
    gctx.clearRect(0, 0, ghostCanvas.width, ghostCanvas.height);
    poseMatchBar.classList.remove("visible");
    ghostLabel.classList.remove("visible");
  }
}

if (ghostToggleButton) {
  ghostToggleButton.addEventListener("click", toggleGhost);
}

// LIVE SKELETON
const SKEL = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
const SKEL_POINTS = new Set(SKEL.flat());

function drawSkeleton(lm, missingIndices) {
  const W = canvas.width, H = canvas.height;
  const missingSet = new Set(missingIndices || []);
  ctx.setLineDash([]);
  for (const [a, b] of SKEL) {
    const lA = lm[a], lB = lm[b];
    if (!lA || !lB || lA.visibility < 0.3 || lB.visibility < 0.3) continue;
    const isWarning = missingSet.has(a) || missingSet.has(b);
    ctx.strokeStyle = isWarning ? "rgba(145,90,58,0.7)" : "rgba(201,167,123,0.6)";
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(lA.x * W, lA.y * H); ctx.lineTo(lB.x * W, lB.y * H); ctx.stroke();
  }
  const JOINT_TO_INDEX = {LElbow:13,RElbow:14,LShoulder:11,RShoulder:12,LKnee:25,RKnee:26};
  const ex = EXERCISES[currentEx] || {};
  const targetIndices = new Set((ex.joints || []).map(j => JOINT_TO_INDEX[j]).filter(Boolean));

  for (const i of SKEL_POINTS) {
    const l = lm[i];
    if (!l || l.visibility < 0.4) continue;
    const isWarning = missingSet.has(i);
    const isTarget = targetIndices.has(i);
    ctx.beginPath(); ctx.arc(l.x * W, l.y * H, 7, 0, Math.PI * 2);
    if (isWarning) ctx.fillStyle = "rgba(145,90,58,0.9)";
    else if (isTarget) ctx.fillStyle = "rgba(201,167,123,0.95)";
    else ctx.fillStyle = "rgba(216,186,148,0.9)";
    ctx.fill();
  }
}

// ROM BAR
function updateROM(angles) {
  const ex = EXERCISES[currentEx];
  const val = ex.romValue(angles);
  if (val === null) { romPct.textContent = "—"; romFill.style.height = "0%"; return; }
  const range = Math.abs(ex.romBottom - ex.romTop);
  let pct;
  if (ex.romBottom < ex.romTop) pct = Math.round(((ex.romTop - val) / range) * 100);
  else pct = Math.round(((val - ex.romTop) / range) * 100);
  pct = Math.max(0, Math.min(100, pct));
  romFill.style.height = pct + "%";
  romPct.textContent = pct + "%";
  romFill.className = "rom-bar-fill" + (pct >= ex.romTargetPct ? " deep" : pct >= ex.romTargetPct * 0.5 ? " partial" : "");
  romTargetLine.style.bottom = ex.romTargetPct + "%";
}

function setPrompt(text, style) {
  if (!text) { stepPrompt.classList.remove("show", "good", "warn"); return; }
  stepPrompt.textContent = text;
  stepPrompt.classList.add("show");
  stepPrompt.classList.toggle("good", style === "good");
  stepPrompt.classList.toggle("warn", style === "warn");
}

function setPartsWarning(missing) {
  if (!missing || missing.length === 0) { partsWarning.classList.remove("show"); partsWarning.textContent = ""; return; }
  partsWarning.textContent = `⚠ Move into frame: ${missing.slice(0, 3).join(", ")}`;
  partsWarning.classList.add("show");
}

// REP LOGIC
function processReps(phase) {
  const ex = EXERCISES[currentEx];
  if (phase === null) { setPrompt(ex.phaseLabels?.wait || "Get ready"); return; }

  const prevPhase = repPhase;

  if (phase === "up" && repPhase === "down") {
    repPhase = "up";
    // Transition: ghost switches to show "down" target
    ghostMorphTo = null; // force morph reset
    triggerPhaseFlash();
    setPrompt(ex.phaseLabels?.up || "Go down");
  } else if (phase === "down" && repPhase === "up") {
    repPhase = "down";
    ghostMorphTo = null;
    triggerPhaseFlash();
    addRep();
    setPrompt("✓ Rep counted!", "good");
    setTimeout(() => setPrompt(ex.phaseLabels?.down || "Stand up"), 900);
    return;
  }
  if (phase !== "mid") setPrompt(repPhase === "up" ? (ex.phaseLabels?.up || "Go down") : (ex.phaseLabels?.down || "Stand up"));
}

function processHold(phase) {
  const ex = EXERCISES[currentEx];
  if (phase === "hold") {
    if (!holdStart) holdStart = Date.now();
    const e = (Date.now() - holdStart) / 1000, frac = Math.min(e / ex.holdTarget, 1);
    holdArc.style.strokeDashoffset = ARC_LEN * (1 - frac);
    holdTimerEl.textContent = Math.floor(e) + "s";
    holdRingContainer.classList.add("visible");
    setPrompt(ex.phaseLabels?.hold || "Hold…");
    if (e >= ex.holdTarget) { addRep(); holdStart = null; }
  } else {
    holdStart = null; holdArc.style.strokeDashoffset = ARC_LEN; holdTimerEl.textContent = "0s";
    holdRingContainer.classList.remove("visible");
    setPrompt(phase === null ? (ex.phaseLabels?.wait || "Get ready") : (ex.phaseLabels?.rest || "Get into position"));
  }
}

function pauseHold() {
  if (holdStart) { holdStart = null; holdArc.style.strokeDashoffset = ARC_LEN; holdTimerEl.textContent = "0s"; }
  holdRingContainer.classList.remove("visible");
}

function addRep() {
  const ex = EXERCISES[currentEx]; repCount++;
  repCountEl.classList.remove("pop"); void repCountEl.offsetWidth; repCountEl.classList.add("pop");
  repCountEl.textContent = repCount;
  progressFill.style.width = Math.min(repCount / ex.target * 100, 100) + "%";
  const now = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  sessionLog.unshift({time: now, text: `${ex.name} — ${ex.type === "hold" ? "Hold" : "Rep"} ${repCount}`});
  renderLog();
}

function renderLog() {
  if (!sessionLog.length) { logEntries.innerHTML = '<div class="log-entry" style="color:var(--muted);font-size:13px">No reps yet</div>'; return; }
  logEntries.innerHTML = sessionLog.slice(0, 12).map(e => `<div class="log-entry"><span>${e.text}</span><span class="log-time">${e.time}</span></div>`).join("");
}

function updateAngleReadouts(angles) {
  [["LElbow","aLElbow"],["RElbow","aRElbow"],["LShoulder","aLShoulder"],["RShoulder","aRShoulder"],["LKnee","aLKnee"],["RKnee","aRKnee"]].forEach(([k,id]) => {
    const ex = EXERCISES[currentEx];
    const el = document.getElementById(id), v = angles[k];
    el.textContent = v !== null ? v + "°" : "—°";
    el.classList.remove("active", "missing");
    if (ex.joints.includes(k)) {
      if (v !== null) el.classList.add("active");
      else el.classList.add("missing");
    }
  });
}

function getMissingLandmarkIndices(lm, requiredGroups) {
  const missing = new Set();
  for (const gk of requiredGroups) {
    if (!LM_GROUPS[gk]) continue;
    const [, indices] = LM_GROUPS[gk];
    for (const i of indices) {
      if (!lm[i] || lm[i].visibility < VIS_THRESHOLD) missing.add(i);
    }
  }
  return [...missing];
}

// MAIN LOOP
function detect() {
  if (!running) return;
  if (!poseLandmarker || video.readyState < 2) { requestAnimationFrame(detect); return; }

  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  ghostCanvas.width = video.videoWidth; ghostCanvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const results = poseLandmarker.detectForVideo(video, performance.now());

  if (results.landmarks && results.landmarks.length > 0) {
    const lm = results.landmarks[0];
    const angles = getAngles(lm);
    const ex = EXERCISES[currentEx];

    const {ok, missing} = checkRequiredParts(lm, ex.requiredGroups);
    const missingLmIndices = ok ? [] : getMissingLandmarkIndices(lm, ex.requiredGroups);
    partsOk = ok;

    drawSkeleton(lm, missingLmIndices);
    drawGhostPose(lm);  // always draw ghost
    updateAngleReadouts(angles);
    updateROM(angles);

    if (!bodyDetected) { bodyDetected = true; detectionBadge.classList.add("detected"); detectionBadge.textContent = "Body detected ✓"; }

    if (!ok) {
      detectionBadge.classList.remove("detected"); detectionBadge.classList.add("warn");
      detectionBadge.textContent = "Required body parts out of frame ⚠";
      setPartsWarning(missing);
      setPrompt(`Step back — ${ex.frameHint}`, "warn");
      if (ex.type === "hold") pauseHold();
      holdRingContainer.classList.remove("visible");
    } else {
      detectionBadge.classList.add("detected"); detectionBadge.classList.remove("warn");
      detectionBadge.textContent = "Body detected ✓";
      setPartsWarning(null);
      const {phase} = ex.check(angles);
      if (ex.type === "rep") { holdRingContainer.classList.remove("visible"); processReps(phase); }
      else processHold(phase);
    }
  } else {
    // No body — still draw ghost in center as a guide
    drawGhostPose(null);
    if (bodyDetected) { bodyDetected = false; detectionBadge.classList.remove("detected", "warn"); detectionBadge.textContent = "No body detected"; }
    holdStart = null; holdRingContainer.classList.remove("visible");
    romFill.style.height = "0%"; romPct.textContent = "—";
    setPartsWarning(null);
    setPrompt(EXERCISES[currentEx].phaseLabels?.wait || "Get ready");
  }

  requestAnimationFrame(detect);
}

// CAMERA
window.startCamera = async function() {
  document.getElementById("placeholder").style.display = "none";
  const sp = document.getElementById("loadingSpinner"); sp.style.display = "flex";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video: {width: 1280, height: 720}});
    video.srcObject = stream; await new Promise(r => video.onloadedmetadata = r);
    video.play(); video.classList.add("visible");
    document.getElementById("loadingMsg").textContent = "Loading pose model…";
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO", numPoses:1
    });
    sp.style.display = "none";
    detectionBadge.classList.add("visible");
    document.getElementById("statusDot").classList.add("live");
    document.getElementById("statusText").textContent = "live";
    running = true;
    ghostMorphTo = null; ghostMorphFrom = null; ghostMorphT = 0;
    setPrompt(EXERCISES[currentEx].phaseLabels?.wait || "Get ready");
    detect();
  } catch(e) {
    sp.style.display = "none";
    document.getElementById("placeholder").style.display = "flex";
    document.getElementById("placeholderMsg").textContent = "Camera error: " + e.message;
  }
};

window.selectExercise = function(btn) {
  document.querySelectorAll(".exercise-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active");
  currentEx = btn.dataset.ex; resetStats(false);
  const ex = EXERCISES[currentEx];
  statModeLabel.textContent = ex.type === "hold" ? "Holds" : "Reps";
  statSub.textContent = `of ${ex.target} target`;
  romPctLabel.textContent = "depth"; romTargetLine.style.bottom = ex.romTargetPct + "%";
  holdRingContainer.classList.remove("visible"); repPhase = "up";
  ghostMorphTo = null; ghostMorphFrom = null; ghostMorphT = 0;
  setPartsWarning(null);
  poseMatchBar.classList.remove("visible");
  if (running) setPrompt(ex.phaseLabels?.wait || "Get ready");
};

window.toggleGhost = function() { return; };

window.resetStats = function(clearLog = true) {
  repCount = 0; repPhase = "up"; holdStart = null;
  repCountEl.textContent = "0"; progressFill.style.width = "0%";
  if (clearLog) { sessionLog = []; renderLog(); }
  holdArc.style.strokeDashoffset = ARC_LEN; holdTimerEl.textContent = "0s";
  holdRingContainer.classList.remove("visible"); romFill.style.height = "0%"; romPct.textContent = "—";
  ghostMorphTo = null; ghostMorphFrom = null; ghostMorphT = 0;
};

statModeLabel.textContent = "Reps"; statSub.textContent = "of 10 target";
romTargetLine.style.bottom = EXERCISES[currentEx].romTargetPct + "%";
</script>
